<div class="bb-wrap">

  <!-- Left Side -->
  <div class="bb-left">
    <div class="bb-logo-icon">
      <svg viewBox="0 0 38 38" fill="none">
        <path d="M19 4C19 4 8 14 8 21.5C8 27.3 13 32 19 32C25 32 30 27.3 30 21.5C30 14 19 4Z" fill="#c0161e"/>
        <path d="M19 12C19 12 13 18 13 22C13 25.3 15.7 28 19 28C22.3 28 25 25.3 25 22C25 18 19 12 19 12Z" fill="white" opacity="0.4"/>
        <path d="M16 22H22M19 19V25" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="bb-brand">BloodBridge</div>
    <div class="bb-tagline">انضم إلينا وكن جزءاً من منظومة إنقاذ الأرواح</div>
    <div class="bb-steps">
      <div class="bb-step">
        <div class="bb-step-num">1</div>
        <div class="bb-step-text">سجّل حسابك في دقيقة واحدة</div>
      </div>
      <div class="bb-step">
        <div class="bb-step-num">2</div>
        <div class="bb-step-text">أكمل ملفك الشخصي</div>
      </div>
      <div class="bb-step">
        <div class="bb-step-num">3</div>
        <div class="bb-step-text">ابدأ التبرع وأنقذ أرواحاً</div>
      </div>
    </div>
  </div>

  <!-- Right Side -->
  <div class="bb-right">
    <div class="bb-card">
      <div class="bb-card-title">إنشاء حساب</div>
      <div class="bb-card-sub">أدخل بياناتك للتسجيل كمتبرع</div>

      <!-- Name -->
      <label class="bb-label">الاسم الكامل</label>
      <div class="bb-input-wrap">
        <div class="bb-input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
        <input class="bb-input" type="text" [(ngModel)]="name" placeholder="محمد أحمد" />
      </div>

      <!-- Email -->
      <label class="bb-label">البريد الإلكتروني</label>
      <div class="bb-input-wrap">
        <div class="bb-input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M2 8l10 7 10-7"/>
          </svg>
        </div>
        <input class="bb-input" type="email" [(ngModel)]="email" placeholder="example@email.com" />
      </div>

      <!-- Phone -->
      <label class="bb-label">رقم الهاتف</label>
      <div class="bb-input-wrap">
        <div class="bb-input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1A19.5 19.5 0 013.1 10.8 19.8 19.8 0 01.1 2.2 2 2 0 012.1 0h3a2 2 0 012 1.7c.1 1 .4 2 .7 2.9a2 2 0 01-.4 2.1L6.1 8a16 16 0 006 6l1.3-1.3a2 2 0 012.1-.5c.9.3 1.9.6 2.9.7A2 2 0 0122 16.9z"/>
          </svg>
        </div>
        <input class="bb-input" type="tel" [(ngModel)]="phone" placeholder="+962 79 000 0000" />
      </div>

      <!-- Password -->
      <label class="bb-label">كلمة المرور</label>
      <div class="bb-input-wrap">
        <div class="bb-input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <input class="bb-input" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="••••••••" />
        <div class="bb-eye" (click)="togglePassword()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>

      <!-- Confirm Password -->
      <label class="bb-label">تأكيد كلمة المرور</label>
      <div class="bb-input-wrap">
        <div class="bb-input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <input class="bb-input" [class.error]="passwordMismatch"
               [type]="showConfirmPassword ? 'text' : 'password'"
               [(ngModel)]="confirmPassword"
               (ngModelChange)="checkPasswordMatch()"
               placeholder="••••••••" />
        <div class="bb-eye" (click)="toggleConfirmPassword()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>
      <div class="bb-hint" *ngIf="passwordMismatch">كلمة المرور غير متطابقة</div>

      <!-- Error Message -->
      <div class="bb-error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <!-- Submit Button -->
      <button class="bb-btn" (click)="onSubmit()" [disabled]="isLoading">
        <span *ngIf="!isLoading">إنشاء الحساب</span>
        <span *ngIf="isLoading">جاري التسجيل...</span>
      </button>

      <div class="bb-login">عندك حساب؟ <a routerLink="/login">سجّل دخولك</a></div>
    </div>
  </div>

</div>
